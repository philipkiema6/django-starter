{% extends "web/app/app_base.html" %}
{% load i18n %}
{% load form_tags %}
{% block app %}
<h1 class="text-2xl font-bold mb-1">{{ page_title }}</h1>
<p class="text-base-content/70 mb-4">{{ course.title }}</p>
<section class="app-card max-w-2xl">
  <form method="post">
    {% csrf_token %}
    {% render_text_input form.title %}
    {% render_field form.content %}
    {% render_text_input form.order %}
    <div class="mt-4 flex gap-2">
      <input class="btn btn-primary" type="submit" value="{% translate "Save" %}">
      <a href="{% url 'courses:instructor_course_detail' course.slug %}" class="btn btn-ghost">
        {% translate "Cancel" %}
      </a>
    </div>
  </form>
</section>
{% endblock %}
