{% load i18n %}
{% if enrollment %}
  <a href="{% url 'courses:learn' course.slug %}" class="btn btn-primary">
    <i class="fa fa-play"></i> {% translate "Continue Learning" %}
  </a>
{% elif user.is_authenticated and user.profile.is_student %}
  <button class="btn btn-primary"
          hx-post="{% url 'courses:enroll' course.slug %}"
          hx-target="this"
          hx-swap="outerHTML">
    {% translate "Enroll" %}
  </button>
{% elif not user.is_authenticated %}
  <a href="{% url 'account_login' %}?next={% url 'courses:detail' course.slug %}" class="btn btn-primary">
    {% translate "Sign in to Enroll" %}
  </a>
{% endif %}
